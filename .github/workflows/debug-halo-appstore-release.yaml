name: Debug Halo App Store Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag"
        required: true
        default: "v2.3.0"

jobs:
  debug-halo-appstore-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Reproduce Halo app store release request
        env:
          GH_TOKEN: ${{ github.token }}
          HALO_PAT: ${{ secrets.HALO_PAT }}
          TAG: ${{ inputs.tag }}
          APP_ID: app-z7ouhnfn
          HALO_BACKEND_BASEURL: https://www.halo.run
        shell: bash
        run: |
          set -euo pipefail

          release_json="$(gh release view "$TAG" --json databaseId,name,tagName,body,isPrerelease,url)"
          release_name="$(jq -r '.name' <<<"$release_json")"
          release_body="$(jq -r '.body // ""' <<<"$release_json")"
          prerelease="$(jq -r '.isPrerelease' <<<"$release_json")"
          release_url="$(jq -r '.url' <<<"$release_json")"

          mkdir -p build/libs
          gh release download "$TAG" --pattern "*.jar" --dir build/libs --clobber
          jar_file="$(find build/libs -maxdepth 1 -name "*.jar" | head -n 1)"
          if [[ -z "$jar_file" ]]; then
            echo "未找到 Release JAR 附件。"
            exit 1
          fi

          unzip -p "$jar_file" plugin.yaml > /tmp/plugin.yaml
          app_version="$(awk -F': ' '/^[[:space:]]*version:/{print $2; exit}' /tmp/plugin.yaml | tr -d '"')"
          app_requires="$(awk -F': ' '/^[[:space:]]*requires:/{print $2; exit}' /tmp/plugin.yaml | tr -d '"')"

          notes_markdown="$release_body"
          notes_markdown="${notes_markdown}"$'\n\n---\n\n'"*Generated from [$TAG]($release_url)*"
          notes_html="$(jq -n --arg text "$notes_markdown" --arg context "${{ github.repository }}" '{text: $text, mode: "gfm", context: $context}' | gh api markdown --input -)"

          jq -n \
            --arg displayName "$release_name" \
            --argjson preRelease "$prerelease" \
            --arg requires "$app_requires" \
            --arg version "$app_version" \
            --arg html "$notes_html" \
            --arg raw "$notes_markdown" \
            --arg releaseName "app-release-qsl-management-2-3-0" \
            '{
              release: {
                apiVersion: "store.halo.run/v1alpha1",
                kind: "Release",
                metadata: {generateName: "app-release-", name: $releaseName},
                spec: {
                  applicationName: "",
                  displayName: $displayName,
                  draft: false,
                  ownerName: "",
                  preRelease: $preRelease,
                  requires: $requires,
                  version: $version,
                  notesName: ""
                }
              },
              notes: {
                apiVersion: "store.halo.run/v1alpha1",
                html: $html,
                kind: "Content",
                metadata: {generateName: "app-release-notes-", name: ""},
                rawType: "MARKDOWN",
                raw: $raw
              },
              makeLatest: true
            }' > /tmp/app-release-payload.json

          echo "应用市场发布请求摘要："
          jq '{displayName: .release.spec.displayName, version: .release.spec.version, requires: .release.spec.requires, makeLatest}' /tmp/app-release-payload.json

          deterministic_release_name="$(jq -r '.release.metadata.name' /tmp/app-release-payload.json)"

          preupload_response=/tmp/halo-preupload-response.json
          preupload_code="$(curl -sS -o "$preupload_response" -w "%{http_code}" \
            -X POST "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/assets" \
            -H "Authorization: Bearer $HALO_PAT" \
            -F "releaseName=$deterministic_release_name" \
            -F "file=@$jar_file")"

          echo "Halo 预上传附件 HTTP 状态：$preupload_code"
          echo "Halo 预上传附件响应体："
          cat "$preupload_response"
          echo

          draft_payload=/tmp/app-release-draft-payload.json
          jq '.release.spec.draft = true | .makeLatest = false' /tmp/app-release-payload.json > "$draft_payload"
          draft_response=/tmp/halo-draft-response.json
          draft_code="$(curl -sS -o "$draft_response" -w "%{http_code}" \
            -X POST "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/releases?applicationName=$APP_ID" \
            -H "Authorization: Bearer $HALO_PAT" \
            -H "Content-Type: application/json" \
            --data-binary @"$draft_payload")"

          echo "Halo 创建草稿发布 HTTP 状态：$draft_code"
          echo "Halo 创建草稿发布响应体："
          cat "$draft_response"
          echo

          if [[ "$draft_code" == 2* ]]; then
            draft_release_name="$(jq -r '.metadata.name // empty' "$draft_response")"
            draft_upload_response=/tmp/halo-draft-upload-response.json
            draft_upload_code="$(curl -sS -o "$draft_upload_response" -w "%{http_code}" \
              -X POST "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/assets" \
              -H "Authorization: Bearer $HALO_PAT" \
              -F "releaseName=$draft_release_name" \
              -F "file=@$jar_file")"

            echo "Halo 草稿上传附件 HTTP 状态：$draft_upload_code"
            echo "Halo 草稿上传附件响应体："
            cat "$draft_upload_response"
            echo

            publish_payload=/tmp/app-release-publish-payload.json
            jq --arg releaseName "$draft_release_name" '.release.metadata.name = $releaseName | .release.spec.draft = false | .makeLatest = true' /tmp/app-release-payload.json > "$publish_payload"

            publish_put_response=/tmp/halo-publish-put-response.json
            publish_put_code="$(curl -sS -o "$publish_put_response" -w "%{http_code}" \
              -X PUT "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/releases/$draft_release_name?applicationName=$APP_ID" \
              -H "Authorization: Bearer $HALO_PAT" \
              -H "Content-Type: application/json" \
              --data-binary @"$publish_payload")"

            echo "Halo PUT 发布草稿 HTTP 状态：$publish_put_code"
            echo "Halo PUT 发布草稿响应体："
            cat "$publish_put_response"
            echo

            publish_patch_response=/tmp/halo-publish-patch-response.json
            publish_patch_code="$(curl -sS -o "$publish_patch_response" -w "%{http_code}" \
              -X PATCH "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/releases/$draft_release_name?applicationName=$APP_ID" \
              -H "Authorization: Bearer $HALO_PAT" \
              -H "Content-Type: application/merge-patch+json" \
              --data-binary '{"spec":{"draft":false},"makeLatest":true}')"

            echo "Halo PATCH 发布草稿 HTTP 状态：$publish_patch_code"
            echo "Halo PATCH 发布草稿响应体："
            cat "$publish_patch_response"
            echo
          fi

          existing_release_response=/tmp/halo-existing-release-response.json
          existing_release_code="$(curl -sS -o "$existing_release_response" -w "%{http_code}" \
            "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/releases/app-release-qsl-management-2-3-0" \
            -H "Authorization: Bearer $HALO_PAT")"

          echo "Halo 查询既有草稿 HTTP 状态：$existing_release_code"
          echo "Halo 查询既有草稿响应体："
          cat "$existing_release_response"
          echo

          if [[ "$existing_release_code" == 2* ]]; then
            publish_resource_payload=/tmp/halo-publish-resource-payload.json
            jq --arg appId "$APP_ID" '
              .spec.applicationName = $appId
              | .spec.draft = false
              | .metadata.annotations = ((.metadata.annotations // {}) + {"store.halo.run/make-latest": "true"})
            ' "$existing_release_response" > "$publish_resource_payload"

            publish_resource_put_response=/tmp/halo-publish-resource-put-response.json
            publish_resource_put_code="$(curl -sS -o "$publish_resource_put_response" -w "%{http_code}" \
              -X PUT "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/releases/app-release-qsl-management-2-3-0?applicationName=$APP_ID" \
              -H "Authorization: Bearer $HALO_PAT" \
              -H "Content-Type: application/json" \
              --data-binary @"$publish_resource_payload")"

            echo "Halo PUT Release资源发布草稿 HTTP 状态：$publish_resource_put_code"
            echo "Halo PUT Release资源发布草稿响应体："
            cat "$publish_resource_put_response"
            echo
          fi

          probe_response_file=/tmp/halo-asset-probe-response.json
          probe_code="$(curl -sS -o "$probe_response_file" -w "%{http_code}" \
            -X POST "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/assets" \
            -H "Authorization: Bearer $HALO_PAT" \
            -F "file=@$jar_file")"

          echo "Halo 未指定 releaseName 上传附件探测 HTTP 状态：$probe_code"
          echo "Halo 未指定 releaseName 上传附件探测响应体："
          cat "$probe_response_file"
          echo

          probe_empty_response_file=/tmp/halo-asset-probe-empty-response.json
          probe_empty_code="$(curl -sS -o "$probe_empty_response_file" -w "%{http_code}" \
            -X POST "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/assets" \
            -H "Authorization: Bearer $HALO_PAT" \
            -F "releaseName=" \
            -F "file=@$jar_file")"

          echo "Halo 空 releaseName 上传附件探测 HTTP 状态：$probe_empty_code"
          echo "Halo 空 releaseName 上传附件探测响应体："
          cat "$probe_empty_response_file"
          echo

          response_file=/tmp/halo-response.json
          http_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/releases?applicationName=$APP_ID" \
            -H "Authorization: Bearer $HALO_PAT" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/app-release-payload.json)"

          echo "Halo 创建发布 HTTP 状态：$http_code"
          echo "Halo 创建发布响应体："
          cat "$response_file"
          echo

          if [[ "$http_code" != 2* ]]; then
            exit 1
          fi

          release_resource_name="$(jq -r '.metadata.name // empty' "$response_file")"
          if [[ -z "$release_resource_name" ]]; then
            echo "创建发布成功，但响应中缺少 metadata.name，无法上传附件。"
            exit 1
          fi

          upload_response=/tmp/halo-upload-response.json
          upload_code="$(curl -sS -o "$upload_response" -w "%{http_code}" \
            -X POST "$HALO_BACKEND_BASEURL/apis/uc.api.developer.store.halo.run/v1alpha1/assets" \
            -H "Authorization: Bearer $HALO_PAT" \
            -F "releaseName=$release_resource_name" \
            -F "file=@$jar_file")"

          echo "Halo 上传附件 HTTP 状态：$upload_code"
          echo "Halo 上传附件响应体："
          cat "$upload_response"
          echo

          if [[ "$upload_code" != 2* ]]; then
            exit 1
          fi
