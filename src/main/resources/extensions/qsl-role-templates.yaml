apiVersion: v1alpha1
kind: Role
metadata:
  name: qsl-management-role-dashboard
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/display-name: "QSL-总览"
    rbac.authorization.halo.run/description: "允许访问 QSL 总览页面与总览数据接口。"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:qsl-management:dashboard:view"]
rules:
  - nonResourceURLs:
      - "/apis/qsl.admin/v1/dashboard/*"
      - "/apis/qsl.admin/v1/reports/summary"
    verbs: ["get"]
---
