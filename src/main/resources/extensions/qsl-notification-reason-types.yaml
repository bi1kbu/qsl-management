apiVersion: notification.halo.run/v1alpha1
kind: ReasonType
metadata:
  name: qsl-card-created
  labels:
    halo.run/hidden: "true"
spec:
  displayName: "QSL 制卡通知"
  description: "当卡片记录创建完成时触发，用于发送制卡场景邮件通知。"
  properties:
    - name: sceneDisplay
      type: string
    - name: stationCallSign
      type: string
    - name: callSign
      type: string
    - name: cardType
      type: string
    - name: cardVersion
      type: string
    - name: cardDate
      type: string
    - name: cardTime
      type: string
    - name: cardRecordName
      type: string
    - name: remarks
      type: string
      optional: true
    - name: targetEmail
      type: string
    - name: triggerAt
      type: string
    - name: dateText
      type: string
    - name: operator
      type: string
---
apiVersion: notification.halo.run/v1alpha1
kind: ReasonType
metadata:
  name: qsl-exchange-reviewed
  labels:
    halo.run/hidden: "true"
spec:
  displayName: "QSL 换卡审核通知"
  description: "当线上换卡申请完成审核后触发，用于发送审核结果邮件通知。"
  properties:
    - name: stationCallSign
      type: string
    - name: stationName
      type: string
      optional: true
    - name: stationTelephone
      type: string
      optional: true
    - name: stationPostalCode
      type: string
      optional: true
    - name: stationAddress
      type: string
      optional: true
    - name: stationEmail
      type: string
      optional: true
    - name: callSign
      type: string
    - name: targetName
      type: string
      optional: true
    - name: targetTelephone
      type: string
      optional: true
    - name: reviewStatus
      type: string
    - name: reviewResultText
      type: string
    - name: reviewMailIntro
      type: string
    - name: reviewReason
      type: string
      optional: true
    - name: requestName
      type: string
    - name: cardVersion
      type: string
      optional: true
    - name: addressMode
      type: string
    - name: bureauName
      type: string
      optional: true
    - name: postalCode
      type: string
      optional: true
    - name: address
      type: string
      optional: true
    - name: remarks
      type: string
      optional: true
    - name: targetEmail
      type: string
    - name: triggerAt
      type: string
    - name: dateText
      type: string
    - name: operator
      type: string
---
