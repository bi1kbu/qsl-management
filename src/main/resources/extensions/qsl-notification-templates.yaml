apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-qsl-card-received
spec:
  reasonSelector:
    reasonType: qsl-card-received
    language: default
  template:
    title: "【QSL】收卡回执：您向[(${stationCallSign})]发出的卡片已收妥"
    rawBody: |
      [(${callSign})]：
          您好，很高兴于[(${dateText})]收到了您的[(${cardType})]卡片，感谢您的来卡。
          期待与您保持通联，祝一切顺利。

          签收备注：[(${remarks})]

      [(${stationCallSign})]
      [(${dateText})]
    htmlBody: |
      <div class="notification-content">
        <p th:text="|${callSign}：|"></p>
        <p th:text="|您好，很高兴于${dateText}收到了您的${cardType}卡片，感谢您的来卡。|"></p>
        <p>期待与您保持通联，祝一切顺利。</p>
        <p th:text="|签收备注：${remarks}|"></p>
        <p th:text="${stationCallSign}"></p>
        <p th:text="${dateText}"></p>
      </div>
