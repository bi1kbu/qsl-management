apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-qsl-card-created
spec:
  reasonSelector:
    reasonType: qsl-card-created
    language: default
  template:
    title: "【QSL】制卡通知：[(${stationCallSign})]给您的卡片已完成制卡"
    rawBody: |
      [(${callSign})]：
          很高兴与您交换卡片，[(${stationCallSign})]给您的卡片已完成制卡，并将择日发出。
          本次卡片相关信息如下：
          form [(${stationCallSign})] to [(${callSign})]
          卡片类型：[(${cardType})]
          卡片编号：[(${cardRecordName})]
          制卡时间：[(${triggerAt})]
          卡片备注：[(${remarks})]

          期待与您保持通联，祝一切顺利。

      [(${stationCallSign})]
      [(${dateText})]
    htmlBody: |
      <div class="notification-content">
        <p th:text="|${callSign}：|"></p>
        <p th:text="|很高兴与您交换卡片，${stationCallSign}给您的卡片已完成制卡，并将择日发出。|"></p>
        <p>本次卡片相关信息如下：</p>
        <p th:text="|form ${stationCallSign} to ${callSign}|"></p>
        <p th:text="|卡片类型：${cardType}|"></p>
        <p th:text="|卡片编号：${cardRecordName}|"></p>
        <p th:text="|制卡时间：${triggerAt}|"></p>
        <p th:text="|卡片备注：${remarks}|"></p>
        <p>期待与您保持通联，祝一切顺利。</p>
        <p th:text="${stationCallSign}"></p>
        <p th:text="${dateText}"></p>
      </div>
---
apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-qsl-card-request-reviewed
spec:
  reasonSelector:
    reasonType: qsl-card-request-reviewed
    language: default
  template:
    title: "【QSL】实体卡申请审核通知：[(${requestName})] [(${reviewResultText})]"
    rawBody: |
      [(${callSign})]：
          您的实体QSL卡申请[(${requestName})][(${reviewResultText})]。
          审核状态：[(${reviewStatus})]
          审核说明：[(${reviewReason})]
          QSO数量：[(${qsoCount})]
          卡片创建状态：[(${cardCreationStatus})]
          已创建卡片：[(${createdCardsText})]
          申请备注：[(${remarks})]

      如需联系本站，请发送邮件至：[(${stationEmail})]

      [(${stationCallSign})]
      [(${dateText})]
    htmlBody: |
      <div class="notification-content">
        <p th:text="|${callSign}：|"></p>
        <p th:text="|您的实体QSL卡申请${requestName}${reviewResultText}。|"></p>
        <p th:text="|审核状态：${reviewStatus}|"></p>
        <p th:text="|审核说明：${reviewReason}|"></p>
        <p th:text="|QSO数量：${qsoCount}|"></p>
        <p th:text="|卡片创建状态：${cardCreationStatus}|"></p>
        <p th:text="|已创建卡片：${createdCardsText}|"></p>
        <p th:text="|申请备注：${remarks}|"></p>
        <p th:text="|如需联系本站，请发送邮件至：${stationEmail}|"></p>
        <p th:text="${stationCallSign}"></p>
        <p th:text="${dateText}"></p>
      </div>
---
apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-qsl-exchange-reviewed
spec:
  reasonSelector:
    reasonType: qsl-exchange-reviewed
    language: default
  template:
    title: "【QSL】线上换卡审核通知：您向[(${stationCallSign})]发出的换卡申请[(${reviewResultText})]"
    rawBody: |
      [(${callSign})]：
          [(${reviewMailIntro})]
          请核对您的收件信息：
          form [(${stationCallSign})] to [(${callSign})]
          收件人：[(${targetName})]（[(${callSign})]）（收）
          邮编：[(${postalCode})]
          地址：[(${address})]
          联系电话：[(${targetTelephone})]
          审核说明：[(${reviewReason})]
          -----
          本台的通信地址为：
          收件人：[(${stationName})]（[(${stationCallSign})]）（收）
          邮编：[(${stationPostalCode})]
          地址：[(${stationAddress})]
          联系电话：[(${stationTelephone})]
          电子邮件：[(${stationEmail})]
          请您向上述地址发送回卡，谢谢。

      [(${stationCallSign})]
      [(${dateText})]
    htmlBody: |
      <div class="notification-content">
        <p th:text="|${callSign}：|"></p>
        <p th:text="${reviewMailIntro}"></p>
        <p>请核对您的收件信息：</p>
        <p th:text="|form ${stationCallSign} to ${callSign}|"></p>
        <p th:text="|收件人：${targetName}（${callSign}）（收）|"></p>
        <p th:text="|邮编：${postalCode}|"></p>
        <p th:text="|地址：${address}|"></p>
        <p th:text="|联系电话：${targetTelephone}|"></p>
        <p th:text="|审核说明：${reviewReason}|"></p>
        <p>-----</p>
        <p>本台的通信地址为：</p>
        <p th:text="|收件人：${stationName}（${stationCallSign}）（收）|"></p>
        <p th:text="|邮编：${stationPostalCode}|"></p>
        <p th:text="|地址：${stationAddress}|"></p>
        <p th:text="|联系电话：${stationTelephone}|"></p>
        <p th:text="|电子邮件：${stationEmail}|"></p>
        <p>请您向上述地址发送回卡，谢谢。</p>
        <p th:text="${stationCallSign}"></p>
        <p th:text="${dateText}"></p>
      </div>
---
apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-qsl-online-auto-approved-request
spec:
  reasonSelector:
    reasonType: qsl-online-auto-approved-request
    language: default
  template:
    title: "【QSL】线上换卡申请已自动审批通过：[(${callSign})]"
    rawBody: |
      [(${stationCallSign})]：
          线上换卡申请已由系统自动审批通过，请按后续流程处理。

          申请信息：
          申请编号：[(${requestName})]
          申请呼号：[(${callSign})]
          卡片版本：[(${cardVersion})]
          地址类型：[(${addressMode})]
          卡片局：[(${bureauName})]
          收件人：[(${targetName})]
          邮编：[(${postalCode})]
          地址：[(${address})]
          联系电话：[(${targetTelephone})]
          电子邮件：[(${targetEmail})]
          备注：[(${remarks})]
          审批状态：[(${reviewStatus})]
          审批说明：[(${reviewReason})]
          触发时间：[(${triggerAt})]

      QSL 管理系统
      [(${dateText})]
    htmlBody: |
      <div class="notification-content">
        <p th:text="|${stationCallSign}：|"></p>
        <p>线上换卡申请已由系统自动审批通过，请按后续流程处理。</p>
        <p>申请信息：</p>
        <p th:text="|申请编号：${requestName}|"></p>
        <p th:text="|申请呼号：${callSign}|"></p>
        <p th:text="|卡片版本：${cardVersion}|"></p>
        <p th:text="|地址类型：${addressMode}|"></p>
        <p th:text="|卡片局：${bureauName}|"></p>
        <p th:text="|收件人：${targetName}|"></p>
        <p th:text="|邮编：${postalCode}|"></p>
        <p th:text="|地址：${address}|"></p>
        <p th:text="|联系电话：${targetTelephone}|"></p>
        <p th:text="|电子邮件：${targetEmail}|"></p>
        <p th:text="|备注：${remarks}|"></p>
        <p th:text="|审批状态：${reviewStatus}|"></p>
        <p th:text="|审批说明：${reviewReason}|"></p>
        <p th:text="|触发时间：${triggerAt}|"></p>
        <p>QSL 管理系统</p>
        <p th:text="${dateText}"></p>
      </div>
---
