apiVersion: v1alpha1
kind: Role
metadata:
  name: guest
  labels:
    rbac.authorization.halo.run/system-reserved: "true"
  annotations:
    rbac.authorization.halo.run/display-name: "访客"
    rbac.authorization.halo.run/disallow-access-console: "true"
    rbac.authorization.halo.run/redirect-on-login: "/uc"
    rbac.authorization.halo.run/dependency-rules: "[]"
    rbac.authorization.halo.run/ui-permissions-aggregated: "[]"
rules:
  - nonResourceURLs:
      - "/apis/qsl.admin/v1/my/callsign-bindings"
      - "/apis/qsl.admin/v1/my/callsign-bindings/**"
      - "/apis/qsl.admin/v1/my/callsign-records/search"
      - "/apis/qsl.admin/v1/my/callsign-records/**"
    verbs: ["get", "post"]
