apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-qsl-card-created
spec:
  reasonSelector:
    reasonType: qsl-card-created
    language: default
  template:
    title: "【QSL】[(${sceneDisplay})]通知：[(${callSign})] [(${cardType})]"
    rawBody: |
      [(${subscriber.displayName})] 您好：

        已触发 QSL [(${sceneDisplay})] 通知，详情如下：
        呼号：[(${callSign})]
        卡片类型：[(${cardType})]
        卡片版本：[(${cardVersion})]
        卡片时间：[(${cardDate})] [(${cardTime})]
        记录编号：[(${cardRecordName})]
        备注：[(${remarks})]
        触发时间：[(${triggerAt})]
        操作人：[(${operator})]
    htmlBody: |
      <div class="notification-content">
        <div class="head">
          <p class="honorific" th:text="|${subscriber.displayName} 您好：|"></p>
        </div>
        <div class="body">
          <p th:text="|已触发 QSL ${sceneDisplay} 通知，详情如下：|"></p>
          <p th:text="|呼号：${callSign}|"></p>
          <p th:text="|卡片类型：${cardType}|"></p>
          <p th:text="|卡片版本：${cardVersion}|"></p>
          <p th:text="|卡片时间：${cardDate} ${cardTime}|"></p>
          <p th:text="|记录编号：${cardRecordName}|"></p>
          <p th:text="|备注：${remarks}|"></p>
          <p th:text="|触发时间：${triggerAt}|"></p>
          <p th:text="|操作人：${operator}|"></p>
        </div>
      </div>
---
apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-qsl-exchange-reviewed
spec:
  reasonSelector:
    reasonType: qsl-exchange-reviewed
    language: default
  template:
    title: "【QSL】换卡申请审核结果：[(${callSign})] [(${reviewStatus})]"
    rawBody: |
      [(${subscriber.displayName})] 您好：

        您的 QSL 线上换卡申请已完成审核。
        呼号：[(${callSign})]
        审核状态：[(${reviewStatus})]
        审核说明：[(${reviewReason})]
        申请编号：[(${requestName})]
        卡片版本：[(${cardVersion})]
        地址类型：[(${addressMode})]
        卡片局：[(${bureauName})]
        邮编：[(${postalCode})]
        地址：[(${address})]
        申请备注：[(${remarks})]
        通知时间：[(${triggerAt})]
        操作人：[(${operator})]
    htmlBody: |
      <div class="notification-content">
        <div class="head">
          <p class="honorific" th:text="|${subscriber.displayName} 您好：|"></p>
        </div>
        <div class="body">
          <p>您的 QSL 线上换卡申请已完成审核。</p>
          <p th:text="|呼号：${callSign}|"></p>
          <p th:text="|审核状态：${reviewStatus}|"></p>
          <p th:text="|审核说明：${reviewReason}|"></p>
          <p th:text="|申请编号：${requestName}|"></p>
          <p th:text="|卡片版本：${cardVersion}|"></p>
          <p th:text="|地址类型：${addressMode}|"></p>
          <p th:text="|卡片局：${bureauName}|"></p>
          <p th:text="|邮编：${postalCode}|"></p>
          <p th:text="|地址：${address}|"></p>
          <p th:text="|申请备注：${remarks}|"></p>
          <p th:text="|通知时间：${triggerAt}|"></p>
          <p th:text="|操作人：${operator}|"></p>
        </div>
      </div>
---
