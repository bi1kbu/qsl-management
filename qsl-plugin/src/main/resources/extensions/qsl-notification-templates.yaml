          很高兴收到您的卡片，我于[(${triggerAt})]收到了您的[(${cardType})]卡片，感谢您的来卡。
          备注：[(${remarks})]

          期待与您保持通联，顺祝一切顺利。

      [(${stationCallSign})]
      [(${dateText})]
    htmlBody: |
      <div class="notification-content">
        <p th:text="|${callSign}：|"></p>
        <p th:text="|很高兴收到您的卡片，我于${triggerAt}收到了您的${cardType}卡片，感谢您的来卡。|"></p>
        <p th:text="|备注：${remarks}|"></p>
        <p>期待与您保持通联，顺祝一切顺利。</p>
        <p th:text="${stationCallSign}"></p>
        <p th:text="${dateText}"></p>
      </div>
